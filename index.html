<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Ozon — короба для ФФ</title>
<style>
:root {
  --bg:#f4f6f9; --surface:#fff; --border:#d8dee8; --text:#1a2332; --muted:#5c6b80;
  --accent:#005bff; --accent-soft:#e8f0ff; --green:#0a7a3e; --red:#c0392b; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.45;min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:16px 14px 40px}
header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px}
header h1{font-size:1.35rem;font-weight:800}
header .sub{color:var(--muted);font-size:.9rem;margin-top:4px}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-top:14px;font-size:.88rem}
.meta div{display:flex;flex-direction:column;gap:2px}
.meta span{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.03em}
.pick-box{background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.pick-box label{display:block;font-weight:700;margin-bottom:8px;font-size:1rem}
.pick-row{display:flex;gap:8px;flex-wrap:wrap}
.pick-row input{flex:1;min-width:180px;font-size:1.15rem;padding:14px 16px;border:1px solid var(--border);border-radius:10px}
.btn{background:var(--accent);color:#fff;border:none;padding:14px 20px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap}
.btn:active{opacity:.85}
.recent{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--accent-soft);border:1px solid #c5d9ff;color:var(--accent);padding:6px 12px;border-radius:999px;font-size:.82rem;font-weight:600;cursor:pointer}
.chip:hover{background:#dce8ff}
.err{color:var(--red);margin-top:10px;font-size:.9rem;display:none;background:#fdecea;border:1px solid #f5c6c2;border-radius:10px;padding:12px 14px;font-weight:600}
.err.show{display:block}
.loading{color:var(--muted);margin-top:10px;font-size:.9rem;display:none}
.loading.show{display:block}
.ver{margin-top:10px;font-size:.78rem;color:var(--muted)}
.search-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.search-box label{display:block;font-weight:700;margin-bottom:8px;font-size:1rem}
.search-box input{width:100%;font-size:1.05rem;padding:12px 14px;border:1px solid var(--border);border-radius:10px}
.search-result{margin-top:14px;display:none;background:var(--accent-soft);border-radius:12px;padding:16px;text-align:center}
.search-result.show{display:block}
.search-result .box-num{font-size:3.5rem;font-weight:900;color:var(--accent);line-height:1}
.search-result .box-meta{margin-top:8px;font-size:1rem;color:var(--muted)}
.tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;color:var(--muted)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.card-head{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;background:#fafbfd}
.card-head:hover{background:#f0f4fa}
.card-head .no{font-size:1.4rem;font-weight:800;color:var(--accent);min-width:2.5rem}
.card-head .info{font-size:.88rem;color:var(--muted);flex:1}
.card-head .region{font-weight:700;color:var(--text);font-size:.95rem}
.card-body{display:none;border-top:1px solid var(--border);padding:0}
.card.open .card-body{display:block}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th,td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
th{background:#f8fafc;color:var(--muted);font-size:.72rem;text-transform:uppercase}
.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.dl{display:inline-block;margin-top:12px;background:var(--green);color:#fff;text-decoration:none;padding:10px 16px;border-radius:10px;font-weight:700;font-size:.92rem}
.empty{padding:40px 20px;text-align:center;color:var(--muted)}
footer{margin-top:20px;text-align:center;color:var(--muted);font-size:.78rem}
@media(max-width:600px){.meta{grid-template-columns:1fr}.search-result .box-num{font-size:2.8rem}}
</style>
</head>
<body>
<div class="wrap">
<div class="pick-box">
  <label for="supplyNum">Номер поставки Ozon</label>
  <div class="pick-row">
    <input id="supplyNum" type="search" placeholder="116057614-1" autocomplete="off">
    <button class="btn" id="openBtn" type="button">Открыть</button>
  </div>
  <div class="recent" id="recent"></div>
  <p class="ver" id="verInfo"></p>
  <div class="loading" id="pickLoading">Загружаю поставку…</div>
  <div class="err" id="pickErr"></div>
</div>

<header id="hdr" style="display:none">
  <h1>📦 Ozon — что в какой короб</h1>
  <p class="sub" id="hdrSub"></p>
  <div class="meta" id="meta"></div>
  <a class="dl" id="xlsxLink" href="#" download>⬇ Скачать Excel</a>
</header>

<div class="search-box" id="skuSearch" style="display:none">
  <label for="q">Нашёл товар — в какой короб?</label>
  <input id="q" type="search" placeholder="Артикул или название…" autocomplete="off">
  <div class="search-result" id="searchResult"></div>
</div>

<div class="tabs" id="tabsBar" style="display:none">
  <button class="tab active" data-tab="boxes">По коробам</button>
  <button class="tab" data-tab="sku">По товару</button>
</div>

<div class="panel active" id="panel-boxes"></div>
<div class="panel" id="panel-sku">
  <div class="card" style="padding:0">
    <div style="max-height:70vh;overflow:auto">
      <table id="skuTable"><thead><tr>
        <th>Артикул</th><th>Название</th><th class="num">Шт</th><th class="num">Короб</th><th>Куда едет</th>
      </tr></thead><tbody></tbody></table>
    </div>
  </div>
</div>

<footer>Обновляет команда из Ozon API · открывай с телефона или компа</footer>
</div>

<script>
let CATALOG = null;
let DATA = null;
let currentSlug = null;

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

function norm(s) {
  return String(s ?? '')
    .trim()
    .toLowerCase()
    .replace(/\s+/g, '')
    .replace(/[–—−]/g, '-')
    .replace(/\//g, '-');
}

function slugify(query) {
  return String(query ?? '').trim().replace(/\//g, '-');
}

function findSupply(query) {
  if (!CATALOG) return null;
  const q = norm(query);
  if (!q) return null;
  const list = CATALOG.supplies;
  let hit = list.find(s => norm(s.order_number) === q || norm(s.slug) === q);
  if (hit) return hit;
  hit = list.find(s => String(s.order_id) === q);
  if (hit) return hit;
  return list.find(s => norm(s.order_number).startsWith(q) || norm(s.slug).startsWith(q));
}

function showErr(msg) {
  const el = document.getElementById('pickErr');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('pickLoading').classList.remove('show');
}

function hideErr() {
  document.getElementById('pickErr').classList.remove('show');
}

function setLoading(on) {
  document.getElementById('pickLoading').classList.toggle('show', on);
  document.getElementById('openBtn').disabled = on;
}

function clearSupplyView() {
  document.getElementById('hdr').style.display = 'none';
  document.getElementById('skuSearch').style.display = 'none';
  document.getElementById('tabsBar').style.display = 'none';
  document.getElementById('panel-boxes').innerHTML = '';
  document.querySelector('#skuTable tbody').innerHTML = '';
  document.getElementById('searchResult').classList.remove('show');
  DATA = null;
  currentSlug = null;
}

async function loadCatalog() {
  const r = await fetch('catalog.json?' + Date.now());
  if (!r.ok) throw new Error('Нет catalog.json — попроси обновить сайт');
  CATALOG = await r.json();
  document.getElementById('verInfo').textContent =
    `Каталог обновлён: ${CATALOG.generated} · ${CATALOG.supplies.length} поставок · v3`;
  const recent = document.getElementById('recent');
  recent.innerHTML = CATALOG.supplies.slice(0, 8).map(s =>
    `<span class="chip" data-slug="${esc(s.slug)}" title="${esc(s.state)}">${esc(s.order_number)} · ${s.box_count} кор.</span>`
  ).join('');
  recent.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => openSupply(chip.dataset.slug));
  });
}

async function loadSupplyJson(slug) {
  const r = await fetch(`supplies/${encodeURIComponent(slug)}.json?` + Date.now());
  if (!r.ok) return null;
  return r.json();
}

async function openSupply(slug, orderNumber) {
  hideErr();
  setLoading(true);
  clearSupplyView();

  const payload = await loadSupplyJson(slug);
  if (!payload) {
    setLoading(false);
    showErr('Нет данных по этой поставке на сайте');
    return;
  }

  DATA = payload;
  currentSlug = slug;
  const entry = CATALOG?.supplies?.find(s => s.slug === slug);
  document.getElementById('supplyNum').value = orderNumber || entry?.order_number || payload.meta?.order_number || slug;
  render();
  location.hash = slug;
  setLoading(false);
}

async function openByInput() {
  const raw = document.getElementById('supplyNum').value;
  const q = raw.trim();
  if (!q) {
    showErr('Введи номер поставки, например 117111449-1');
    return;
  }

  hideErr();
  setLoading(true);
  clearSupplyView();

  const hit = findSupply(q);
  if (hit) {
    await openSupply(hit.slug, hit.order_number);
    return;
  }

  const slug = slugify(q);
  const payload = await loadSupplyJson(slug);
  if (payload) {
    DATA = payload;
    currentSlug = slug;
    document.getElementById('supplyNum').value = payload.meta?.order_number || q;
    render();
    location.hash = slug;
    setLoading(false);
    return;
  }

  setLoading(false);
  showErr(
    `Поставка «${q}» не найдена на сайте. ` +
    `Проверь номер или выбери из списка ниже. ` +
    `Если поставка только что создана — попроси обновить сайт.`
  );
}

function render() {
  document.getElementById('hdr').style.display = 'block';
  document.getElementById('skuSearch').style.display = 'block';
  document.getElementById('tabsBar').style.display = 'flex';

  const m = DATA.meta;
  document.getElementById('hdrSub').textContent =
    `Поставка ${m.order_number} · ${m.state} · обновлено ${CATALOG.generated}`;
  document.getElementById('meta').innerHTML = [
    ['Слот отгрузки', m.timeslot],
    ['Точка сдачи', m.dropoff],
    ['Коробов', m.box_count],
    ['Адрес', m.dropoff_address],
  ].map(([k,v]) => `<div><span>${k}</span><strong>${v||'—'}</strong></div>`).join('');

  const xlsx = document.getElementById('xlsxLink');
  xlsx.href = `supplies/${encodeURIComponent(currentSlug)}.xlsx`;
  xlsx.download = `FF_короба_Ozon_${currentSlug}.xlsx`;

  document.getElementById('panel-boxes').innerHTML = DATA.boxes.map(b => `
    <div class="card" data-box="${b.no}">
      <div class="card-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="no">${b.no}</span>
        <div>
          <div class="region">${esc(b.region)}</div>
          <div class="info">${esc(b.zone)} · ${b.items.length} поз. · ${esc(b.barcode)}</div>
        </div>
        <span style="color:var(--muted)">▼</span>
      </div>
      <div class="card-body">
        <table><thead><tr><th>Артикул</th><th>Название</th><th class="num">Шт</th></tr></thead>
        <tbody>${b.items.map(i => `<tr><td><strong>${esc(i.article)}</strong></td><td>${esc(i.name)}</td><td class="num">${i.qty}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>`).join('');

  document.querySelector('#skuTable tbody').innerHTML = DATA.by_sku.map(r => `
    <tr>
      <td><strong>${esc(r['Артикул'])}</strong></td>
      <td>${esc(r['Название'])}</td>
      <td class="num">${r['Шт всего']}</td>
      <td class="num">${r['→ Короб №']}</td>
      <td>${esc(r['Куда едет'])}</td>
    </tr>`).join('');

  document.getElementById('q').value = '';
  document.getElementById('searchResult').classList.remove('show');
}

function doSearch(q) {
  const el = document.getElementById('searchResult');
  q = q.trim().toLowerCase();
  if (!q || !DATA) { el.classList.remove('show'); return; }
  const hit = DATA.by_sku.find(r =>
    String(r['Артикул']).toLowerCase().includes(q) ||
    String(r['Название']).toLowerCase().includes(q)
  );
  if (!hit) {
    el.innerHTML = '<div style="color:var(--muted)">Не найдено</div>';
    el.classList.add('show');
    return;
  }
  el.innerHTML = `
    <div style="font-size:.95rem;color:var(--muted)">${esc(hit['Артикул'])} · ${esc(hit['Название'])}</div>
    <div class="box-num">КОРОБ ${hit['→ Короб №']}</div>
    <div class="box-meta">Куда едет: <strong>${esc(hit['Куда едет'])}</strong> · ${hit['Шт всего']} шт</div>`;
  el.classList.add('show');
  const card = document.querySelector(`.card[data-box="${hit['→ Короб №']}"]`);
  if (card) { card.classList.add('open'); card.scrollIntoView({behavior:'smooth', block:'center'}); }
}

document.getElementById('openBtn').addEventListener('click', openByInput);
document.getElementById('supplyNum').addEventListener('keydown', e => {
  if (e.key === 'Enter') openByInput();
});
document.getElementById('q').addEventListener('input', e => doSearch(e.target.value));
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

loadCatalog().then(() => {
  const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
  if (hash) {
    const entry = CATALOG.supplies.find(s => s.slug === hash);
    openSupply(hash, entry?.order_number);
  }
}).catch(err => {
  showErr(err.message);
});
</script>
</body>
</html>
